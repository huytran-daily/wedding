<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <style>
    .branch { fill: none; stroke: #6B2D3E; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .leaf { fill: none; stroke: #6B2D3E; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .leaf-vein { fill: none; stroke: #6B2D3E; stroke-width: 2; stroke-linecap: round; }
  </style>

  <!-- Main stem going from left to right with curve -->
  <path class="branch" d="M 30 160 C 80 155, 130 145, 180 130 C 230 115, 280 105, 340 100 C 400 95, 460 100, 520 110 C 550 115, 575 120, 590 125"/>

  <!-- Sub-branch going upper left from ~x=180 -->
  <path class="branch" d="M 180 130 C 170 110, 155 90, 140 70"/>

  <!-- Sub-branch going upper from ~x=260 -->
  <path class="branch" d="M 260 108 C 255 88, 248 68, 240 50"/>

  <!-- Sub-branch upper right from ~x=340 -->
  <path class="branch" d="M 340 100 C 345 80, 350 62, 355 45"/>

  <!-- Lower small branch from ~x=300 -->
  <path class="branch" d="M 300 103 C 295 118, 288 132, 278 148"/>

  <!-- Lower branch right ~x=440 -->
  <path class="branch" d="M 440 100 C 438 115, 434 128, 428 142"/>
  <!-- Main stem going from left to right with curve -->
  <path class="branch" d="M 30 160 C 80 155, 130 145, 180 130 C 230 115, 280 105, 340 100 C 400 95, 460 100, 520 110 C 550 115, 575 120, 590 125"/>

  <!-- Sub-branch going upper left from ~x=180 -->
  <path class="branch" d="M 180 130 C 170 110, 155 90, 140 70"/>

  <!-- Sub-branch going upper from ~x=260 -->
  <path class="branch" d="M 260 108 C 255 88, 248 68, 240 50"/>

  <!-- Sub-branch upper right from ~x=340 -->
  <path class="branch" d="M 340 100 C 345 80, 350 62, 355 45"/>

  <!-- Lower small branch from ~x=300 -->
  <path class="branch" d="M 300 103 C 295 118, 288 132, 278 148"/>

  <!-- Lower branch right ~x=440 -->
  <path class="branch" d="M 440 100 C 438 115, 434 128, 428 142"/>

  <!-- ======= LEAVES ======= -->

  <!-- Leaf upper-left on stem (large, pointing up-left) -->
  <path class="leaf" d="M 140 70 C 120 55, 95 45, 80 38 C 85 52, 100 65, 140 70 Z"/>
  <path class="leaf-vein" d="M 140 70 C 118 58, 95 47, 80 38"/>
  <!-- Second petal on same branch -->
  <path class="leaf" d="M 140 70 C 155 52, 165 38, 162 25 C 148 32, 138 50, 140 70 Z"/>
  <path class="leaf-vein" d="M 140 70 C 155 52, 163 36, 162 25"/>

  <!-- Leaf upper-center left -->
  <path class="leaf" d="M 240 50 C 222 35, 200 28, 185 22 C 192 36, 208 47, 240 50 Z"/>
  <path class="leaf-vein" d="M 240 50 C 220 36, 200 28, 185 22"/>
  <!-- Other side -->
  <path class="leaf" d="M 240 50 C 255 33, 262 18, 258 8 C 244 16, 236 34, 240 50 Z"/>
  <path class="leaf-vein" d="M 240 50 C 255 33, 261 17, 258 8"/>

  <!-- Leaf upper-center right (~x=355) -->
  <path class="leaf" d="M 355 45 C 337 30, 318 23, 303 17 C 310 31, 326 42, 355 45 Z"/>
  <path class="leaf-vein" d="M 355 45 C 336 30, 317 23, 303 17"/>
  <!-- Other side -->
  <path class="leaf" d="M 355 45 C 370 28, 376 13, 371 3 C 357 11, 350 29, 355 45 Z"/>
  <path class="leaf-vein" d="M 355 45 C 370 28, 375 12, 371 3"/>

  <!-- Large leaf far right (~x=530) horizontal -->
  <path class="leaf" d="M 510 108 C 530 95, 565 92, 590 96 C 570 105, 535 110, 510 108 Z"/>
  <path class="leaf-vein" d="M 510 108 C 535 99, 562 93, 590 96"/>
  <!-- Under side of right leaf -->
  <path class="leaf" d="M 510 108 C 528 118, 558 120, 580 116 C 562 108, 533 107, 510 108 Z"/>
  <path class="leaf-vein" d="M 510 108 C 533 116, 558 119, 580 116"/>

  <!-- Lower leaf left (hanging ~x=278) -->
  <path class="leaf" d="M 278 148 C 262 155, 248 160, 238 165 C 245 155, 258 147, 278 148 Z"/>
  <path class="leaf-vein" d="M 278 148 C 260 156, 246 161, 238 165"/>
  <path class="leaf" d="M 278 148 C 288 160, 292 172, 286 180 C 277 170, 273 158, 278 148 Z"/>
  <path class="leaf-vein" d="M 278 148 C 288 159, 292 172, 286 180"/>

  <!-- Lower leaf right (hanging ~x=428) -->
  <path class="leaf" d="M 428 142 C 412 150, 398 155, 388 160 C 395 150, 410 143, 428 142 Z"/>
  <path class="leaf-vein" d="M 428 142 C 410 151, 397 156, 388 160"/>
  <path class="leaf" d="M 428 142 C 438 153, 442 165, 436 173 C 427 163, 423 152, 428 142 Z"/>
  <path class="leaf-vein" d="M 428 142 C 438 153, 441 165, 436 173"/>

  <!-- Extra small leaf near base left -->
  <path class="leaf" d="M 200 127 C 190 118, 178 114, 170 112 C 175 120, 185 126, 200 127 Z"/>
  <path class="leaf-vein" d="M 200 127 C 184 118, 174 113, 170 112"/>

  <!-- Extra leaf mid-stem lower -->
  <path class="leaf" d="M 370 98 C 360 108, 352 116, 345 122 C 350 112, 360 103, 370 98 Z"/>
  <path class="leaf-vein" d="M 370 98 C 355 110, 349 118, 345 122"/>

</svg>
